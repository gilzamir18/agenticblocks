name: Publish package to PyPI

on:
  release:
    types: [published]
  # Permite executar o workflow manualmente no GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
        
    - name: Install pypa/build
      run: python -m pip install build --user
        
    - name: Build a binary wheel and a source tarball
      run: python -m build
      
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    
    # Este ambiente (environment) corresponde à configuração opcional que você viu no PyPI.
    # Recomendado: crie também um "Environment" no GitHub (Settings -> Environments -> pypi).
    environment:
      name: agenticblocks
      url: https://pypi.org/p/agenticblocks
      
    permissions:
      id-token: write  # IMPORTANTE: mandatório para trusted publishing (OIDC) no PyPI
      contents: read
      
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
        
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
